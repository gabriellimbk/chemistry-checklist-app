<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chemistry Summary Maps</title>
  <style>
    :root {
      --paper: #f5f1ea;
      --ink: #101010;
      --muted: #5d5d5d;
      --panel: rgba(255, 255, 255, 0.96);
      --line: rgba(16, 16, 16, 0.14);
      --shadow: 0 22px 54px rgba(0, 0, 0, 0.16);
      --progress: #2f9e44;
      --progress-low: #d9a521;
      --sidebar-width: min(360px, calc(100vw - 48px));
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top, rgba(255,255,255,0.8), transparent 36%), linear-gradient(180deg, #ede7dc 0%, var(--paper) 100%);
    }
    button { font: inherit; }
    .topic-frame { display: block; width: 100%; height: 100vh; border: 0; background: var(--paper); }
    .menu-button {
      position: fixed; z-index: 20; top: 16px; left: 16px; width: 46px; height: 46px;
      border: 1px solid rgba(16,16,16,0.16); border-radius: 14px; background: rgba(255,255,255,0.92);
      color: var(--ink); box-shadow: 0 14px 34px rgba(0,0,0,0.13); cursor: pointer; display: inline-grid; place-items: center;
    }
    .menu-icon, .menu-icon::before, .menu-icon::after { display: block; width: 19px; height: 2px; border-radius: 999px; background: currentColor; content: ""; }
    .menu-icon { position: relative; }
    .menu-icon::before { position: absolute; transform: translateY(-6px); }
    .menu-icon::after { position: absolute; transform: translateY(6px); }
    .scrim { position: fixed; z-index: 30; inset: 0; background: rgba(16,16,16,0.28); opacity: 0; pointer-events: none; transition: opacity 160ms ease; }
    .sidebar {
      position: fixed; z-index: 40; top: 0; left: 0; width: var(--sidebar-width); height: 100vh;
      padding: 22px 18px 18px; background: var(--panel); border-right: 1px solid var(--line);
      box-shadow: var(--shadow); transform: translateX(calc(-1 * var(--sidebar-width) - 12px));
      transition: transform 180ms ease; display: flex; flex-direction: column; gap: 18px;
    }
    body.sidebar-open .scrim { opacity: 1; pointer-events: auto; }
    body.sidebar-open .sidebar { transform: translateX(0); }
    .sidebar-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; padding: 4px 2px 0; }
    .eyebrow { margin: 0 0 4px; color: var(--muted); font-size: 0.78rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; }
    h1 { margin: 0; font-size: 1.35rem; line-height: 1.15; }
    .student-meta { margin: 8px 2px 0; color: var(--muted); font-size: 0.82rem; }
    .close-button { flex: 0 0 auto; width: 36px; height: 36px; border: 1px solid var(--line); border-radius: 12px; background: #fff; color: var(--ink); font-size: 1.45rem; line-height: 1; cursor: pointer; }
    .topic-list { min-height: 0; overflow: auto; display: grid; gap: 8px; padding: 2px 2px 12px; }
    .topic-button {
      width: 100%; border: 1px solid transparent; border-radius: 10px; background: transparent; color: var(--ink);
      cursor: pointer; display: grid; grid-template-columns: auto minmax(0, 1fr); gap: 11px; align-items: start; padding: 10px 11px; text-align: left;
    }
    .topic-button:hover { background: rgba(16,16,16,0.06); }
    .topic-button.is-active { background: #101010; color: #fff; box-shadow: 0 10px 22px rgba(0,0,0,0.15); }
    .topic-button.is-locked { color: rgba(16,16,16,0.38); cursor: not-allowed; background: rgba(16,16,16,0.035); }
    .topic-button.is-locked:hover { background: rgba(16,16,16,0.035); }
    .topic-code { min-width: 2.5rem; color: inherit; font-size: 0.74rem; font-weight: 800; opacity: 0.68; letter-spacing: 0.04em; text-transform: uppercase; }
    .topic-name { min-width: 0; font-size: 0.98rem; font-weight: 750; line-height: 1.2; }
    .topic-copy { min-width: 0; display: grid; gap: 6px; }
    .topic-progress { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; }
    .topic-progress-track { height: 5px; border-radius: 999px; overflow: hidden; background: rgba(16,16,16,0.12); }
    .topic-button.is-active .topic-progress-track { background: rgba(255,255,255,0.22); }
    .topic-progress-fill { display: block; width: 0%; height: 100%; border-radius: inherit; background: var(--progress-low); transition: width 160ms ease; }
    .topic-progress-fill.is-strong { background: var(--progress); }
    .topic-progress-text { color: inherit; font-size: 0.75rem; font-weight: 800; opacity: 0.72; white-space: nowrap; }
    .status-panel {
      position: fixed; z-index: 5; inset: 0; display: none; place-items: center; padding: 28px;
      background: radial-gradient(circle at top, rgba(255,255,255,0.8), transparent 40%), var(--paper);
    }
    .status-panel.is-visible { display: grid; }
    .status-card { max-width: 520px; padding: 26px; border-radius: 20px; background: rgba(255,255,255,0.94); box-shadow: var(--shadow); }
    .status-card h2 { margin: 0 0 10px; font-size: 1.45rem; }
    .status-card p { margin: 0; color: var(--muted); line-height: 1.45; }
  </style>
</head>
<body>
  <button class="menu-button" type="button" id="menuButton" aria-label="Open topic menu" aria-controls="sidebar" aria-expanded="false">
    <span class="menu-icon" aria-hidden="true"></span>
  </button>
  <div class="scrim" id="scrim" aria-hidden="true"></div>
  <aside class="sidebar" id="sidebar" aria-label="Topic menu">
    <div class="sidebar-header">
      <div>
        <p class="eyebrow">Summary Maps</p>
        <h1>Select Topic</h1>
        <p class="student-meta" id="studentMeta"></p>
      </div>
      <button class="close-button" type="button" id="closeButton" aria-label="Close topic menu">&times;</button>
    </div>
    <nav class="topic-list" id="topicList" aria-label="Topics"></nav>
  </aside>
  <iframe class="topic-frame" id="topicFrame" title="Selected summary map"></iframe>
  <section class="status-panel" id="statusPanel" aria-live="polite">
    <div class="status-card">
      <h2 id="statusTitle">Access required</h2>
      <p id="statusText">Open this app from Canvas using your assigned student link.</p>
    </div>
  </section>

  <script src="topics.js?v=20260616r-v2"></script>
  <script>
    const topics = window.CHEMISTRY_TOPICS || [];
    const progressStoragePrefix = "summary-map-progress:";
    const topicPageVersion = "20260616r-v2-teacher-student";
    const studentAccessStorageKey = "chemistry-checklist-v2.studentAccessId";
    const studentClassStorageKey = "chemistry-checklist-v2.studentClass";

    const menuButton = document.getElementById("menuButton");
    const closeButton = document.getElementById("closeButton");
    const scrim = document.getElementById("scrim");
    const topicList = document.getElementById("topicList");
    const topicFrame = document.getElementById("topicFrame");
    const statusPanel = document.getElementById("statusPanel");
    const statusTitle = document.getElementById("statusTitle");
    const statusText = document.getElementById("statusText");
    const studentMeta = document.getElementById("studentMeta");

    let activeFolder = "";
    let studentProfile = null;
    let unlockRows = [];

    function topicUrl(topic) {
      return `${encodeURIComponent(topic.folder).replace(/%2F/g, "/")}/index.html?v=${topicPageVersion}`;
    }
    function progressStorageKey(topic) { return `${progressStoragePrefix}${topic.folder}`; }
    function apiJson(path, options = {}) {
      return fetch(path, { ...options, headers: { "Content-Type": "application/json", ...(options.headers || {}) } })
        .then(async (response) => {
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.error || `Request failed with status ${response.status}`);
          return data;
        });
    }
    function cleanCanvasIdFromUrl() {
      const url = new URL(window.location.href);
      if (!url.searchParams.has("id")) return;
      url.searchParams.delete("id");
      history.replaceState(null, "", `${url.pathname}${url.search}${url.hash}`);
    }
    function getRequestedStudentId() {
      const fromUrl = new URLSearchParams(window.location.search).get("id");
      return (fromUrl || sessionStorage.getItem(studentAccessStorageKey) || "").trim();
    }
    function showStatus(title, text) {
      statusTitle.textContent = title;
      statusText.textContent = text;
      statusPanel.classList.add("is-visible");
    }
    function hideStatus() { statusPanel.classList.remove("is-visible"); }
    function rowTime(row) {
      const time = Date.parse(row && row.updated_at || "");
      return Number.isFinite(time) ? time : 0;
    }
    function effectiveUnlock(topic) {
      const topicId = topic.folder;
      const candidates = unlockRows.filter((row) =>
        row.topic_id === topicId &&
        (
          row.scope_type === "global" ||
          (row.scope_type === "class" && row.class_name === studentProfile.class_name)
        )
      );
      if (!candidates.length) return false;
      const latest = candidates.sort((a, b) => rowTime(b) - rowTime(a))[0];
      return Boolean(latest.is_unlocked);
    }
    function getTopicProgress(topic) {
      let saved = null;
      try { saved = JSON.parse(localStorage.getItem(progressStorageKey(topic)) || "null"); } catch (error) { saved = null; }
      const total = Number.isFinite(saved && saved.total) ? saved.total : topic.total;
      const masteredCount = Number.isFinite(saved && saved.masteredCount) ? Math.min(saved.masteredCount, total) : 0;
      const percent = total ? Math.round((masteredCount / total) * 100) : 0;
      return { masteredCount, total, percent };
    }
    function updateTopicProgressRow(topic) {
      const button = topicList.querySelector(`[data-folder="${CSS.escape(topic.folder)}"]`);
      if (!button) return;
      const progress = getTopicProgress(topic);
      const text = button.querySelector(".topic-progress-text");
      const fill = button.querySelector(".topic-progress-fill");
      text.textContent = `${progress.masteredCount} / ${progress.total}`;
      fill.style.width = `${progress.percent}%`;
      fill.classList.toggle("is-strong", progress.percent > 50);
    }
    function updateAllTopicProgress() { topics.forEach(updateTopicProgressRow); }
    function openSidebar() { document.body.classList.add("sidebar-open"); menuButton.setAttribute("aria-expanded", "true"); }
    function closeSidebar() { document.body.classList.remove("sidebar-open"); menuButton.setAttribute("aria-expanded", "false"); }
    function setActiveTopic(topic, updateHash = true) {
      if (!topic || !effectiveUnlock(topic)) return;
      if (topic.folder === activeFolder) { closeSidebar(); return; }
      activeFolder = topic.folder;
      topicFrame.src = topicUrl(topic);
      document.title = `${topic.name} | Chemistry Summary Maps`;
      [...topicList.querySelectorAll(".topic-button")].forEach((button) => {
        button.classList.toggle("is-active", button.dataset.folder === topic.folder);
      });
      if (updateHash) history.replaceState(null, "", `#${encodeURIComponent(topic.folder)}`);
      hideStatus();
      closeSidebar();
    }
    function topicFromHash() {
      const raw = window.location.hash.replace(/^#/, "");
      if (!raw) return null;
      const folder = decodeURIComponent(raw);
      return topics.find((topic) => topic.folder === folder || topic.code === folder);
    }
    function renderTopicList() {
      topicList.innerHTML = "";
      topics.forEach((topic) => {
        const unlocked = effectiveUnlock(topic);
        const button = document.createElement("button");
        button.type = "button";
        button.className = `topic-button${unlocked ? "" : " is-locked"}`;
        button.dataset.folder = topic.folder;
        button.disabled = !unlocked;
        button.innerHTML = `
          <span class="topic-code">${topic.code}</span>
          <span class="topic-copy">
            <span class="topic-name">${topic.name}</span>
            <span class="topic-progress" aria-hidden="true">
              <span class="topic-progress-track"><span class="topic-progress-fill"></span></span>
              <span class="topic-progress-text">0 / ${topic.total}</span>
            </span>
          </span>`;
        button.addEventListener("click", () => setActiveTopic(topic));
        topicList.appendChild(button);
      });
      updateAllTopicProgress();
    }
    async function initStudentApp() {
      const studentId = getRequestedStudentId();
      if (!studentId) {
        showStatus("Access required", "Open this app from Canvas using your assigned student link.");
        return;
      }
      try {
        const data = await apiJson(`/api/student-session?id=${encodeURIComponent(studentId)}`);
        studentProfile = data.student;
        unlockRows = Array.isArray(data.unlockRows) ? data.unlockRows : [];
        sessionStorage.setItem(studentAccessStorageKey, studentProfile.student_id);
        sessionStorage.setItem(studentClassStorageKey, studentProfile.class_name);
        cleanCanvasIdFromUrl();
        studentMeta.textContent = `${studentProfile.class_name} · ${studentProfile.student_id}`;
        renderTopicList();
        const requestedTopic = topicFromHash();
        const firstTopic = requestedTopic && effectiveUnlock(requestedTopic) ? requestedTopic : topics.find(effectiveUnlock);
        if (firstTopic) {
          setActiveTopic(firstTopic, false);
        } else {
          topicFrame.removeAttribute("src");
          showStatus("No topics unlocked", "Your teacher has not unlocked any topics yet.");
        }
      } catch (error) {
        sessionStorage.removeItem(studentAccessStorageKey);
        sessionStorage.removeItem(studentClassStorageKey);
        showStatus("Access denied", error.message || "This student ID is not allowed.");
      }
    }

    menuButton.addEventListener("click", openSidebar);
    closeButton.addEventListener("click", closeSidebar);
    scrim.addEventListener("click", closeSidebar);
    window.addEventListener("keydown", (event) => { if (event.key === "Escape") closeSidebar(); });
    window.addEventListener("hashchange", () => { const topic = topicFromHash(); if (topic) setActiveTopic(topic, false); });
    window.addEventListener("message", (event) => {
      if (!event.data || event.data.type !== "summary-map-progress") return;
      const topic = topics.find((item) => item.folder === event.data.folderName || item.code === event.data.topicCode);
      if (topic) updateTopicProgressRow(topic);
    });
    window.addEventListener("storage", (event) => { if (event.key && event.key.startsWith(progressStoragePrefix)) updateAllTopicProgress(); });
    window.addEventListener("focus", updateAllTopicProgress);

    initStudentApp();
  </script>
</body>
</html>
