<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teacher Console | Chemistry Summary Maps</title>
  <style>
    :root {
      --paper: #f5f1ea;
      --ink: #101010;
      --muted: #5d5d5d;
      --panel: rgba(255,255,255,0.96);
      --line: rgba(16,16,16,0.14);
      --shadow: 0 22px 54px rgba(0,0,0,0.16);
      --progress: #2f9e44;
      --sidebar-width: min(380px, calc(100vw - 42px));
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top, rgba(255,255,255,0.8), transparent 36%), linear-gradient(180deg, #ede7dc 0%, var(--paper) 100%);
    }
    button, select, input { font: inherit; }
    .topic-frame { display: block; width: 100%; height: 100vh; border: 0; background: var(--paper); }
    .topbar {
      position: fixed; z-index: 25; top: 14px; left: 14px; display: flex; gap: 10px; align-items: center;
    }
    .icon-button, .action-button {
      min-height: 44px; border: 1px solid rgba(16,16,16,0.16); border-radius: 14px; background: rgba(255,255,255,0.94);
      color: var(--ink); box-shadow: 0 14px 34px rgba(0,0,0,0.13); cursor: pointer;
    }
    .icon-button { width: 46px; display: inline-grid; place-items: center; }
    .action-button { padding: 0 14px; font-weight: 800; }
    .menu-icon, .menu-icon::before, .menu-icon::after { display: block; width: 19px; height: 2px; border-radius: 999px; background: currentColor; content: ""; }
    .menu-icon { position: relative; }
    .menu-icon::before { position: absolute; transform: translateY(-6px); }
    .menu-icon::after { position: absolute; transform: translateY(6px); }
    .class-select {
      min-height: 44px; max-width: min(42vw, 260px); padding: 0 12px; border: 1px solid rgba(16,16,16,0.16);
      border-radius: 14px; background: rgba(255,255,255,0.94); box-shadow: 0 14px 34px rgba(0,0,0,0.1); font-weight: 750;
    }
    .scrim { position: fixed; z-index: 30; inset: 0; background: rgba(16,16,16,0.28); opacity: 0; pointer-events: none; transition: opacity 160ms ease; }
    .sidebar {
      position: fixed; z-index: 40; top: 0; left: 0; width: var(--sidebar-width); height: 100vh; padding: 22px 18px 18px;
      background: var(--panel); border-right: 1px solid var(--line); box-shadow: var(--shadow);
      transform: translateX(calc(-1 * var(--sidebar-width) - 12px)); transition: transform 180ms ease; display: flex; flex-direction: column; gap: 18px;
    }
    body.sidebar-open .scrim { opacity: 1; pointer-events: auto; }
    body.sidebar-open .sidebar { transform: translateX(0); }
    .sidebar-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; padding: 4px 2px 0; }
    .eyebrow { margin: 0 0 4px; color: var(--muted); font-size: 0.78rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; }
    h1 { margin: 0; font-size: 1.35rem; line-height: 1.15; }
    .close-button { flex: 0 0 auto; width: 36px; height: 36px; border: 1px solid var(--line); border-radius: 12px; background: #fff; color: var(--ink); font-size: 1.45rem; line-height: 1; cursor: pointer; }
    .topic-list { min-height: 0; overflow: auto; display: grid; gap: 8px; padding: 2px 2px 12px; }
    .topic-button {
      width: 100%; border: 1px solid transparent; border-radius: 10px; background: transparent; color: var(--ink);
      cursor: pointer; display: grid; grid-template-columns: auto minmax(0, 1fr) auto; gap: 11px; align-items: start; padding: 10px 11px; text-align: left;
    }
    .topic-button:hover { background: rgba(16,16,16,0.06); }
    .topic-button.is-active { background: #101010; color: #fff; box-shadow: 0 10px 22px rgba(0,0,0,0.15); }
    .topic-code { min-width: 2.7rem; font-size: 0.74rem; font-weight: 800; opacity: 0.68; letter-spacing: 0.04em; text-transform: uppercase; }
    .topic-name { min-width: 0; font-size: 0.98rem; font-weight: 750; line-height: 1.2; }
    .lock-state { font-size: 0.72rem; font-weight: 900; opacity: 0.7; text-transform: uppercase; }
    .modal {
      position: fixed; z-index: 80; inset: 0; display: none; place-items: center; padding: 22px; background: rgba(16,16,16,0.34);
    }
    .modal.is-visible { display: grid; }
    .dialog {
      width: min(640px, 100%); max-height: min(760px, calc(100vh - 44px)); overflow: auto;
      border-radius: 20px; background: #fff; box-shadow: var(--shadow); padding: 22px;
    }
    .dialog-header { display: flex; align-items: start; justify-content: space-between; gap: 18px; margin-bottom: 18px; }
    .dialog h2 { margin: 0 0 4px; font-size: 1.35rem; }
    .dialog p { margin: 0; color: var(--muted); }
    .password-form { display: grid; gap: 12px; }
    .password-input { min-height: 46px; padding: 0 12px; border: 1px solid var(--line); border-radius: 12px; }
    .primary-button { min-height: 44px; border: 0; border-radius: 12px; background: #101010; color: #fff; font-weight: 850; cursor: pointer; padding: 0 16px; }
    .secondary-button { min-height: 40px; border: 1px solid var(--line); border-radius: 12px; background: #fff; color: var(--ink); font-weight: 800; cursor: pointer; padding: 0 14px; }
    .unlock-grid { display: grid; gap: 8px; }
    .unlock-row { display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: start; padding: 9px; border-radius: 10px; background: rgba(16,16,16,0.04); }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
    .error-text { color: #b42318; min-height: 1.2em; font-weight: 700; }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="icon-button" type="button" id="menuButton" aria-label="Open topic menu"><span class="menu-icon" aria-hidden="true"></span></button>
    <select class="class-select" id="classSelect" aria-label="Select class">
      <option value="all">All Classes</option>
    </select>
    <button class="action-button" type="button" id="unlockButton">Unlock topics</button>
  </div>
  <div class="scrim" id="scrim" aria-hidden="true"></div>
  <aside class="sidebar" id="sidebar" aria-label="Topic menu">
    <div class="sidebar-header">
      <div>
        <p class="eyebrow">Teacher Console</p>
        <h1>Select Topic</h1>
      </div>
      <button class="close-button" type="button" id="closeButton" aria-label="Close topic menu">&times;</button>
    </div>
    <nav class="topic-list" id="topicList" aria-label="Topics"></nav>
  </aside>
  <iframe class="topic-frame" id="topicFrame" title="Selected summary map"></iframe>

  <section class="modal is-visible" id="loginModal" aria-label="Teacher login">
    <div class="dialog">
      <div class="dialog-header">
        <div>
          <p class="eyebrow">Teacher Console</p>
          <h2>Enter Password</h2>
          <p>Access is restricted to the shared teacher account.</p>
        </div>
      </div>
      <form class="password-form" id="loginForm">
        <input class="password-input" id="passwordInput" type="password" autocomplete="current-password" placeholder="Password" autofocus>
        <div class="error-text" id="loginError"></div>
        <button class="primary-button" type="submit">Open teacher console</button>
      </form>
    </div>
  </section>

  <section class="modal" id="unlockModal" aria-label="Topic unlock settings">
    <div class="dialog">
      <div class="dialog-header">
        <div>
          <p class="eyebrow">Topic Access</p>
          <h2 id="unlockTitle">Unlock topics</h2>
          <p id="unlockSubtitle"></p>
        </div>
        <button class="close-button" type="button" id="unlockClose" aria-label="Close unlock settings">&times;</button>
      </div>
      <div class="unlock-grid" id="unlockGrid"></div>
      <div class="dialog-actions">
        <button class="secondary-button" type="button" id="unlockCancel">Cancel</button>
        <button class="primary-button" type="button" id="unlockSave">Save</button>
      </div>
    </div>
  </section>

  <script src="topics.js?v=20260616r-v2"></script>
  <script>
    const topics = window.CHEMISTRY_TOPICS || [];
    const topicPageVersion = "20260616r-v2-teacher-student";
    const menuButton = document.getElementById("menuButton");
    const closeButton = document.getElementById("closeButton");
    const scrim = document.getElementById("scrim");
    const topicList = document.getElementById("topicList");
    const topicFrame = document.getElementById("topicFrame");
    const classSelect = document.getElementById("classSelect");
    const unlockButton = document.getElementById("unlockButton");
    const loginModal = document.getElementById("loginModal");
    const loginForm = document.getElementById("loginForm");
    const passwordInput = document.getElementById("passwordInput");
    const loginError = document.getElementById("loginError");
    const unlockModal = document.getElementById("unlockModal");
    const unlockGrid = document.getElementById("unlockGrid");
    const unlockTitle = document.getElementById("unlockTitle");
    const unlockSubtitle = document.getElementById("unlockSubtitle");
    const unlockClose = document.getElementById("unlockClose");
    const unlockCancel = document.getElementById("unlockCancel");
    const unlockSave = document.getElementById("unlockSave");

    let teacherData = { classes: [], unlockRows: [] };
    let activeFolder = "";

    function apiJson(path, options = {}) {
      return fetch(path, { ...options, headers: { "Content-Type": "application/json", ...(options.headers || {}) } })
        .then(async (response) => {
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.error || `Request failed with status ${response.status}`);
          return data;
        });
    }
    function scope() { return classSelect.value === "all" ? "all" : "class"; }
    function selectedClassName() { return classSelect.value === "all" ? "" : classSelect.value; }
    function topicUrl(topic) {
      const query = new URLSearchParams({ v: topicPageVersion, teacher: "1", scope: scope() });
      if (scope() === "class") query.set("className", selectedClassName());
      return `${encodeURIComponent(topic.folder).replace(/%2F/g, "/")}/index.html?${query.toString()}`;
    }
    function rowTime(row) {
      const time = Date.parse(row && row.updated_at || "");
      return Number.isFinite(time) ? time : 0;
    }
    function unlockSetting(topic) {
      const topicId = topic.folder;
      const candidates = teacherData.unlockRows.filter((row) =>
        row.topic_id === topicId &&
        (
          row.scope_type === "global" ||
          (scope() === "class" && row.scope_type === "class" && row.class_name === selectedClassName())
        )
      );
      if (!candidates.length) return false;
      const latest = candidates.sort((a, b) => rowTime(b) - rowTime(a))[0];
      return Boolean(latest.is_unlocked);
    }
    function openSidebar() { document.body.classList.add("sidebar-open"); }
    function closeSidebar() { document.body.classList.remove("sidebar-open"); }
    function setActiveTopic(topic, updateHash = true) {
      if (!topic) return;
      activeFolder = topic.folder;
      topicFrame.src = topicUrl(topic);
      document.title = `${topic.name} | Teacher Console`;
      [...topicList.querySelectorAll(".topic-button")].forEach((button) => button.classList.toggle("is-active", button.dataset.folder === topic.folder));
      if (updateHash) history.replaceState(null, "", `#${encodeURIComponent(topic.folder)}`);
      closeSidebar();
    }
    function topicFromHash() {
      const raw = window.location.hash.replace(/^#/, "");
      if (!raw) return null;
      const folder = decodeURIComponent(raw);
      return topics.find((topic) => topic.folder === folder || topic.code === folder);
    }
    function renderTopicList() {
      topicList.innerHTML = "";
      topics.forEach((topic) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `topic-button${topic.folder === activeFolder ? " is-active" : ""}`;
        button.dataset.folder = topic.folder;
        button.innerHTML = `
          <span class="topic-code">${topic.code}</span>
          <span class="topic-name">${topic.name}</span>
          <span class="lock-state">${unlockSetting(topic) ? "Open" : "Locked"}</span>`;
        button.addEventListener("click", () => setActiveTopic(topic));
        topicList.appendChild(button);
      });
    }
    function renderClassSelect() {
      const current = classSelect.value || "all";
      classSelect.innerHTML = '<option value="all">All Classes</option>';
      teacherData.classes.forEach((className) => {
        const option = document.createElement("option");
        option.value = className;
        option.textContent = className;
        classSelect.appendChild(option);
      });
      classSelect.value = [...classSelect.options].some((option) => option.value === current) ? current : "all";
    }
    async function loadTeacherData() {
      teacherData = await apiJson("/api/teacher-data");
      renderClassSelect();
      renderTopicList();
      setActiveTopic(topicFromHash() || topics[0], false);
    }
    function openUnlockModal() {
      unlockTitle.textContent = scope() === "all" ? "Unlock topics for all classes" : `Unlock topics for ${selectedClassName()}`;
      unlockSubtitle.textContent = scope() === "all"
        ? "These cohort settings apply unless a class-specific setting overrides them."
        : "Saving here creates class-specific access settings for this class.";
      unlockGrid.innerHTML = "";
      topics.forEach((topic) => {
        const label = document.createElement("label");
        label.className = "unlock-row";
        label.innerHTML = `
          <input type="checkbox" value="${topic.folder}" ${unlockSetting(topic) ? "checked" : ""}>
          <span><strong>${topic.code} ${topic.name}</strong></span>`;
        unlockGrid.appendChild(label);
      });
      unlockModal.classList.add("is-visible");
    }
    function closeUnlockModal() { unlockModal.classList.remove("is-visible"); }
    async function saveUnlocks() {
      const unlocks = {};
      unlockGrid.querySelectorAll("input[type='checkbox']").forEach((input) => {
        unlocks[input.value] = input.checked;
      });
      await apiJson("/api/set-topic-unlocks", {
        method: "POST",
        body: JSON.stringify({
          scope_type: scope() === "class" ? "class" : "global",
          class_name: scope() === "class" ? selectedClassName() : null,
          unlocks
        })
      });
      closeUnlockModal();
      await loadTeacherData();
    }
    async function checkSession() {
      try {
        await apiJson("/api/teacher-session");
        loginModal.classList.remove("is-visible");
        await loadTeacherData();
      } catch (error) {
        loginModal.classList.add("is-visible");
      }
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginError.textContent = "";
      try {
        await apiJson("/api/teacher-login", { method: "POST", body: JSON.stringify({ password: passwordInput.value }) });
        passwordInput.value = "";
        loginModal.classList.remove("is-visible");
        await loadTeacherData();
      } catch (error) {
        loginError.textContent = error.message || "Unable to log in.";
      }
    });
    classSelect.addEventListener("change", () => { renderTopicList(); setActiveTopic(topics.find((topic) => topic.folder === activeFolder) || topics[0], false); });
    unlockButton.addEventListener("click", openUnlockModal);
    unlockClose.addEventListener("click", closeUnlockModal);
    unlockCancel.addEventListener("click", closeUnlockModal);
    unlockSave.addEventListener("click", () => saveUnlocks().catch((error) => alert(error.message || "Unable to save unlock settings.")));
    menuButton.addEventListener("click", openSidebar);
    closeButton.addEventListener("click", closeSidebar);
    scrim.addEventListener("click", closeSidebar);
    window.addEventListener("keydown", (event) => { if (event.key === "Escape") { closeSidebar(); closeUnlockModal(); } });
    window.addEventListener("hashchange", () => { const topic = topicFromHash(); if (topic) setActiveTopic(topic, false); });

    checkSession();
  </script>
</body>
</html>
